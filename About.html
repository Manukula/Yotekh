<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Are We</title>

<link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;600;700&display=swap" rel="stylesheet">
 <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins&family=Roboto&family=Titillium+Web&display=swap" rel="stylesheet" />

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f8e1a90484.js" crossorigin="anonymous"></script>

<style>
/* RESET */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: 'Tomorrow', sans-serif;
    background-color: #162a52;
    color: white;
}




/* BRAND */
.brand{
    display: flex;
    align-items: center;
}




/* MAIN CONTENT */
.info {
    margin-top: 120px; /* pushes below header */
    display: flex;
    justify-content: center;
}

/* CONTAINER */
.container {
    text-align: center;
    width: 80%;
    max-width: 900px;
}

/* TITLE */
h1 {
    letter-spacing: 6px;
    font-size: 32px;
    margin-bottom: 10px;
}

.underline {
    width: 120px;
    height: 5px;
    background: #00d4ff;
    margin: 0 auto 40px auto;
    border-radius: 5px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-bottom: 50px;
}

.btn {
    background: #0b1c3d;
    padding: 15px 30px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s ease;
    font-weight: 600;
    min-width: 120px;
}

.btn:hover {
    background: #00d4ff;
    color: black;
    transform: translateY(-5px);
}

/* CONTENT BOX */
.content-box {
    min-height: 120px;
    border-radius: 20px;
    background: linear-gradient(90deg, #ff4b5c, #8e54e9);
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* MOBILE */
@media (max-width: 600px) {
    .btn {
        width: 100%;
    }

    .nav-links ul{
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<section class="header">
<nav>
    <div class="brand">
        <img src="gam3rslooby.png" alt="logo">
        <h3 class="logo">Yo-tekh</h3>
    </div>

    <div class="nav-links">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Gaming.html">Gaming Tips</a></li>
            <li><a href="#">Health & Balance</a></li>
            <li><a href="About.html">About Us</a></li>
        </ul>
    </div>
</nav>
</section>

<!-- MAIN SECTION -->
<section class="info">

<div class="container">
    <h1>WHO ARE WE</h1>
    <div class="underline"></div>

    <div class="buttons">
        <div data-action="members" class="btn">Members</div>
        <div data-action="skills" class="btn">Skills</div>
        <div data-action="started" class="btn">Started</div>
        <div data-action="experience" class="btn">Experience</div>
        <div data-action="background" class="btn">Background</div>
    </div>

    <div class="content-box" id="content">
        Click a button to learn more about us.
    </div>
</div>

</section>

<script>
const content = document.getElementById("content");

const data = {
    members: "We are a team of passionate developers, designers, and innovators dedicated to building impactful digital solutions. Led by Nkosiyethu Manukula.",
    skills: "Our skills include web development, mobile app development, IT support, and programming using Python and Java and web development languages such as html,css,js.",
    started: "Our journey started in 2023 when we were introduced to IT through an MCIT SETA bridging course, where we developed and expanded our skills.",
    experience: "We have experience in building websites, school support programs in basic computer practise subject and bit in the coding side in html and python, and practical Computer leteracy skills training.",
    background: "Our background combines technology, education, and community development, with both theoretical and practical expertise."
};

document.querySelectorAll(".btn").forEach(button => {
    button.addEventListener("click", () => {
        const action = button.getAttribute("data-action");
        content.textContent = data[action];
    });
});

const navLinks = document.getElementById("navLinks");

    function showMenu() {
      navLinks.style.right = "0";
    }

    function hideMenu() {
      navLinks.style.right = "-200px";
    }

    // Optional: close nav when clicking outside on mobile
    window.addEventListener('click', function(e) {
      if (window.innerWidth <= 768 && navLinks.style.right === "0px") {
        if (!navLinks.contains(e.target) && !document.getElementById('openNav').contains(e.target)) {
          hideMenu();
        }
      }
    });
</script>

</body>
</html>
